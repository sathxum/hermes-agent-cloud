name: Deploy Hermes Agent - Cloudflare Tunnel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io docker-compose curl
          docker --version

      - name: Install Cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Create Directories
        run: mkdir -p ~/hermes-data ~/workspace && echo "✅ Done"

      - name: Pull Image
        run: |
          echo "📦 Pulling Hermes..."
          docker pull ekkoye8888/hermes-web-ui:latest
          echo "✅ Pulled"

      - name: Start Hermes
        run: |
          echo "🐳 Starting Hermes..."
          docker stop hermes-webui 2>/dev/null || true
          docker rm hermes-webui 2>/dev/null || true
          
          docker run -d \
            --name hermes-webui \
            -p 8648:8648 \
            -p 6060:6060 \
            -v ~/hermes-data:/root/.hermes \
            -v ~/workspace:/workspace \
            -e HERMES_WEBUI_PASSWORD=HarmesDeploy2024! \
            -e HERMES_WEBUI_HOST=0.0.0.0 \
            ekkoye8888/hermes-web-ui:latest
          
          echo "✅ Started"
          sleep 15
          docker ps

      - name: Verify Hermes
        run: |
          echo "🔍 Checking..."
          docker logs hermes-webui --tail 20
          echo ""
          echo "✅ Container status:"
          docker ps | grep hermes-webui || echo "Not running!"

      - name: Start Cloudflare Tunnel
        run: |
          echo "☁️ Starting Cloudflare Quick Tunnel..."
          
          nohup cloudflared tunnel --url http://localhost:8648 > cloudflared.log 2>&1 &
          
          # Wait for URL
          for i in {1..20}; do
            TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' cloudflared.log 2>/dev/null | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ TUNNEL_URL=$TUNNEL_URL"
              break
            fi
            echo "Waiting... $i/20"
            sleep 2
          done
          
          FINAL_URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' cloudflared.log 2>/dev/null | head -1)
          echo "FINAL_URL=$FINAL_URL" >> $GITHUB_ENV
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "☁️ TUNNEL URL: $FINAL_URL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Display Access Details
        run: |
          echo ""
          echo "╔═══════════════════════════════════════════════════════════════════╗"
          echo "║         🎉 HERMES AGENT - CLOUDFLARE TUNNEL ACTIVE 🎉           ║"
          echo "╠═══════════════════════════════════════════════════════════════════╣"
          echo "║                                                                   ║"
          echo "║  🌐 PUBLIC URL: ${{ env.FINAL_URL }}                     ║"
          echo "║                                                                   ║"
          echo "║  🔑 PASSWORD: HarmesDeploy2024!                                  ║"
          echo "║                                                                   ║"
          echo "║  ⏰ This will run for up to 6 HOURS                               ║"
          echo "║  💡 Keep this workflow running to maintain access                ║"
          echo "║                                                                   ║"
          echo "╚═══════════════════════════════════════════════════════════════════╝"

      - name: Keep Running
        run: |
          echo "⏳ Keeping Hermes and Tunnel running..."
          echo "⏰ Monitoring every 60 seconds..."
          echo ""
          
          ELAPSED=0
          while [ $ELAPSED -lt 360 ]; do
            # Check container
            if docker ps | grep -q hermes-webui; then
              echo "[$ELAPSED min] ✅ Hermes: RUNNING"
            else
              echo "[$ELAPSED min] 🔄 Restarting Hermes..."
              docker start hermes-webui
            fi
            
            # Check tunnel
            if pgrep -f cloudflared > /dev/null; then
              TUNNEL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' ~/cloudflared.log 2>/dev/null | head -1)
              echo "[$ELAPSED min] ☁️  Tunnel: $TUNNEL"
            else
              echo "[$ELAPSED min] 🔄 Restarting Tunnel..."
              nohup cloudflared tunnel --url http://localhost:8648 > cloudflared.log 2>&1 &
            fi
            
            # Print every 5 minutes
            if [ $((ELAPSED % 5)) -eq 0 ] && [ $ELAPSED -gt 0 ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "⏰ Time: $ELAPSED minutes elapsed"
              TUNNEL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' cloudflared.log 2>/dev/null | head -1)
              echo "🌐 URL: $TUNNEL"
              echo "🔑 Password: HarmesDeploy2024!"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            fi
            
            sleep 60
            ELAPSED=$((ELAPSED + 1))
          done
          
          echo "⏰ 6 hours completed!"
