name: Hermes Agent - Official Dashboard + Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      statuses: read
      gists: write
    timeout-minutes: 360
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Docker
        run: |
          sudo apt-get remove -y containerd docker.io 2>/dev/null || true
          curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
          sudo sh /tmp/get-docker.sh
          sudo systemctl enable docker
          docker --version

      - name: Install Cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Setup Hermes Data Directory
        run: |
          mkdir -p ~/.hermes
          chmod 755 ~/.hermes

      - name: Generate Credentials and Create Env File
        run: |
          DASHBOARD_USERNAME="admin"
          DASHBOARD_PASSWORD="HarmesDeploy2024!"
          DASHBOARD_SECRET=$(openssl rand -base64 32)
          API_SERVER_KEY=$(openssl rand -hex 32)
          
          echo "Username: $DASHBOARD_USERNAME"
          echo "Password: $DASHBOARD_PASSWORD"
          echo "Secret: $DASHBOARD_SECRET"
          echo "API Key: $API_SERVER_KEY"
          
          echo "DASHBOARD_USERNAME=$DASHBOARD_USERNAME" >> $GITHUB_ENV
          echo "DASHBOARD_PASSWORD=$DASHBOARD_PASSWORD" >> $GITHUB_ENV
          echo "DASHBOARD_SECRET=$DASHBOARD_SECRET" >> $GITHUB_ENV
          echo "API_SERVER_KEY=$API_SERVER_KEY" >> $GITHUB_ENV
          
          printf '%s\n' \
            "HERMES_DASHBOARD_BASIC_AUTH_USERNAME=$DASHBOARD_USERNAME" \
            "HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=$DASHBOARD_PASSWORD" \
            "HERMES_DASHBOARD_BASIC_AUTH_SECRET=$DASHBOARD_SECRET" \
            "API_SERVER_ENABLED=true" \
            "API_SERVER_HOST=0.0.0.0" \
            "API_SERVER_KEY=$API_SERVER_KEY" \
            "API_SERVER_CORS_ORIGINS=*" \
            "HERMES_DASHBOARD=1" \
            "HERMES_DASHBOARD_HOST=0.0.0.0" \
            "HERMES_DASHBOARD_PORT=9119" \
            > ~/.hermes/.env
          chmod 600 ~/.hermes/.env

      - name: Pull Official Hermes Agent
        run: |
          docker pull nousresearch/hermes-agent:latest

      - name: Start Hermes with Dashboard
        run: |
          docker stop hermes 2>/dev/null || true
          docker rm hermes 2>/dev/null || true
          
          docker run -d \
            --name hermes \
            --restart unless-stopped \
            -p 8642:8642 \
            -p 9119:9119 \
            -v ~/.hermes:/opt/data \
            -e HERMES_DASHBOARD=1 \
            -e HERMES_DASHBOARD_HOST=0.0.0.0 \
            -e HERMES_DASHBOARD_PORT=9119 \
            -e API_SERVER_ENABLED=true \
            -e API_SERVER_HOST=0.0.0.0 \
            -e "API_SERVER_KEY=${{ env.API_SERVER_KEY }}" \
            -e "API_SERVER_CORS_ORIGINS=*" \
            -e "HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${{ env.DASHBOARD_USERNAME }}" \
            -e "HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${{ env.DASHBOARD_PASSWORD }}" \
            -e "HERMES_DASHBOARD_BASIC_AUTH_SECRET=${{ env.DASHBOARD_SECRET }}" \
            --env-file ~/.hermes/.env \
            nousresearch/hermes-agent:latest gateway run
          
          echo "Hermes started"
          sleep 30
          docker ps

      - name: Verify Dashboard
        run: |
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:9119/ 2>/dev/null)
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "401" ]; then
              echo "Dashboard responding (HTTP $HTTP_CODE)"
              break
            fi
            echo "Waiting... $i/30"
            sleep 2
          done
          docker logs hermes --tail 20

      - name: Start Cloudflare Tunnel
        run: |
          pkill -f cloudflared 2>/dev/null || true
          nohup cloudflared tunnel --url http://localhost:9119 > cloudflared.log 2>&1 &
          
          TUNNEL_URL=""
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' cloudflared.log 2>/dev/null | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
              echo "Tunnel URL: $TUNNEL_URL"
              break
            fi
            echo "Getting tunnel... $i/30"
            sleep 2
          done
          
          if [ -z "$TUNNEL_URL" ]; then
            echo "FAIL: No tunnel URL"
            cat cloudflared.log
            exit 1
          fi

      - name: Save Access Info to Gist
        run: |
          TUNNEL_URL="${{ env.TUNNEL_URL }}"
          USERNAME="${{ env.DASHBOARD_USERNAME }}"
          PASSWORD="${{ env.DASHBOARD_PASSWORD }}"
          API_KEY="${{ env.API_SERVER_KEY }}"
          
          python3 gist_update.py "$TUNNEL_URL" "$USERNAME" "$PASSWORD" "$API_KEY"
          
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X PATCH "https://api.github.com/gists/f6e14605827ea2fc1d41ee79b54e5c92" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/gist_payload.json)
          
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          echo "Gist update response code: $HTTP_CODE"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Gist update failed!"
            echo "$RESPONSE"
            exit 1
          fi
          
          echo "[OK] Credentials saved to Gist: https://gist.github.com/sathxum/f6e14605827ea2fc1d41ee79b54e5c92"

      - name: Display Access Info
        run: |
          echo "============================================"
          echo "  HERMES AGENT OFFICIAL - DEPLOYED!"
          echo "============================================"
          echo ""
          echo "  PUBLIC URL: ${{ env.TUNNEL_URL }}"
          echo "  IMAGE: nousresearch/hermes-agent:latest"
          echo ""
          echo "  LOGIN:"
          echo "  Username: ${{ env.DASHBOARD_USERNAME }}"
          echo "  Password: ${{ env.DASHBOARD_PASSWORD }}"
          echo ""
          echo "  PORTS: Dashboard=9119 | Gateway=8642"
          echo "  API KEY: ${{ env.API_SERVER_KEY }}"
          echo ""
          echo "  RUNTIME: 6 hours max"
          echo "============================================"
          echo ""
          echo "  Gist: https://gist.github.com/sathxum/f6e14605827ea2fc1d41ee79b54e5c92"

      - name: Monitor for 6 Hours
        run: |
          echo "Starting 6-hour monitoring..."
          ELAPSED=0
          
          while [ $ELAPSED -lt 360 ]; do
            if ! docker ps | grep -q hermes; then
              echo "[$ELAPSED min] Restarting Hermes..."
              docker start hermes 2>/dev/null || docker run -d \
                --name hermes \
                --restart unless-stopped \
                -p 8642:8642 \
                -p 9119:9119 \
                -v ~/.hermes:/opt/data \
                -e HERMES_DASHBOARD=1 \
                -e "API_SERVER_KEY=${{ env.API_SERVER_KEY }}" \
                --env-file ~/.hermes/.env \
                nousresearch/hermes-agent:latest gateway run
              sleep 10
            fi
            
            if ! pgrep -f cloudflared > /dev/null; then
              echo "[$ELAPSED min] Restarting Tunnel..."
              nohup cloudflared tunnel --url http://localhost:9119 > cloudflared.log 2>&1 &
              sleep 10
            fi
            
            if [ $((ELAPSED % 5)) -eq 0 ] && [ $ELAPSED -gt 0 ]; then
              TUNNEL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' cloudflared.log 2>/dev/null | tail -1)
              if [ -n "$TUNNEL" ]; then
                echo "=========================================="
                echo "Time: $ELAPSED min | Left: $((360-ELAPSED)) min"
                echo "URL: $TUNNEL"
                echo "User: ${{ env.DASHBOARD_USERNAME }}"
                echo "Pass: ${{ env.DASHBOARD_PASSWORD }}"
                echo "Hermes: $(docker ps | grep -q hermes && echo RUNNING || echo RESTARTING)"
                echo "Tunnel: $(pgrep -f cloudflared > /dev/null && echo ACTIVE || echo RESTARTING)"
                echo "=========================================="
              fi
            fi
            
            sleep 60
            ELAPSED=$((ELAPSED + 1))
          done
          
          echo "=========================================="
          echo "  6 HOURS DONE - DEPLOYMENT ENDED"
          echo "=========================================="