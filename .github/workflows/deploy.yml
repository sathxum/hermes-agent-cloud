name: Deploy Hermes Agent

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create directories
        run: |
          mkdir -p ~/hermes-data ~/workspace
          echo "✅ Directories created"

      - name: Generate Credentials
        run: |
          echo "🔐 CREDENTIALS:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Web UI Password: HarmesDeploy2024!"
          echo "Agent API Key: $(openssl rand -hex 32)"
          echo "Session Secret: $(openssl rand -hex 48)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Start Hermes with Docker Run
        run: |
          echo "🐳 Pulling and starting Hermes..."
          docker pull ekkye8888/hermes-web-ui:latest 2>/dev/null || \
          docker pull ekkoye8888/hermes-web-ui:latest 2>/dev/null || \
          echo "⚠️ Pull failed, trying to run anyway"
          
          docker stop hermes-webui 2>/dev/null || true
          docker rm hermes-webui 2>/dev/null || true
          
          docker run -d \
            --name hermes-webui \
            --restart unless-stopped \
            -p 8648:8648 \
            -p 6060:6060 \
            -v ~/hermes-data:/root/.hermes \
            -v ~/workspace:/workspace \
            ekkye8888/hermes-web-ui:latest 2>/dev/null || \
          docker run -d \
            --name hermes-webui \
            --restart unless-stopped \
            -p 8648:8648 \
            -p 6060:6060 \
            -v ~/hermes-data:/root/.hermes \
            -v ~/workspace:/workspace \
            ekkoye8888/hermes-web-ui:latest 2>/dev/null || \
          echo "❌ Container failed to start"
          
          sleep 15
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Check Status
        run: |
          echo "🔍 Checking Hermes..."
          if docker ps | grep -q hermes-webui; then
            echo "✅ Container is RUNNING"
            docker logs hermes-webui --tail 50
          else
            echo "❌ Container NOT running"
            docker ps -a
          fi

      - name: Final Output
        if: success()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║         🎉 HERMES AGENT DEPLOYED SUCCESS! 🎉          ║"
          echo "╠════════════════════════════════════════════════════════╣"
          echo "║  🌐 Local Access: http://localhost:8648              ║"
          echo "║  💬 Gateway: http://localhost:6060                   ║"
          echo "║  🔑 Password: HarmesDeploy2024!                      ║"
          echo "║  📦 Image: hermes-web-ui                             ║"
          echo "║                                                        ║"
          echo "║  ⚠️  For Internet Access:                            ║"
          echo "║     Add Cloudflare tunnel token as secret            ║"
          echo "╚════════════════════════════════════════════════════════╝"
