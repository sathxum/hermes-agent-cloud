name: Deploy Hermes Agent - Cloudflare Tunnel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Docker (Official Method)
        run: |
          echo "🐳 Installing Docker via official script..."
          # Remove conflicting packages first
          sudo apt-get remove -y containerd 2>/dev/null || true
          sudo apt-get remove -y docker.io 2>/dev/null || true
          sudo apt-get autoremove -y
          
          # Install Docker via official script
          curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
          sudo sh /tmp/get-docker.sh
          
          echo "✅ Docker installed:"
          docker --version
          sudo systemctl enable docker
          echo "✅ Docker service enabled"

      - name: Install Cloudflared
        run: |
          echo "☁️ Installing Cloudflare Tunnel..."
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared
          cloudflared --version
          echo "✅ Cloudflared installed"

      - name: Create Directories
        run: |
          mkdir -p ~/hermes-data ~/workspace
          echo "✅ Directories created"

      - name: Pull Hermes Image
        run: |
          echo "📦 Pulling Hermes Web UI..."
          docker pull ekkoye8888/hermes-web-ui:latest
          echo "✅ Image pulled successfully"

      - name: Start Hermes
        run: |
          echo "🐳 Starting Hermes container..."
          docker stop hermes-webui 2>/dev/null || true
          docker rm hermes-webui 2>/dev/null || true
          docker network create hermes-net 2>/dev/null || true
          
          docker run -d \
            --name hermes-webui \
            --network hermes-net \
            --restart unless-stopped \
            -p 8648:8648 \
            -p 6060:6060 \
            -v ~/hermes-data:/root/.hermes \
            -v ~/workspace:/workspace \
            -e HERMES_WEBUI_PASSWORD=HarmesDeploy2024! \
            -e HERMES_WEBUI_HOST=0.0.0.0 \
            ekkoye8888/hermes-web-ui:latest
          
          echo "✅ Container started"
          sleep 20
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Verify Hermes Running
        run: |
          echo "🔍 Verifying Hermes..."
          if docker ps | grep -q hermes-webui; then
            echo "✅ Container is RUNNING"
            echo ""
            echo "📋 Container logs:"
            docker logs hermes-webui --tail 30
          else
            echo "❌ Container NOT running!"
            docker ps -a
            exit 1
          fi

      - name: Start Cloudflare Tunnel
        run: |
          echo "☁️ Starting Cloudflare Quick Tunnel..."
          
          # Kill any existing
          pkill -f cloudflared 2>/dev/null || true
          
          # Start tunnel
          nohup cloudflared tunnel --url http://localhost:8648 > cloudflared.log 2>&1 &
          
          # Wait for URL (max 30 seconds)
          for i in {1..30}; do
            TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' cloudflared.log 2>/dev/null | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ Tunnel URL: $TUNNEL_URL"
              break
            fi
            echo "Waiting for tunnel... ($i/30)"
            sleep 2
          done
          
          FINAL_URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' cloudflared.log 2>/dev/null | head -1)
          
          if [ -z "$FINAL_URL" ]; then
            echo "❌ Failed to get tunnel URL!"
            cat cloudflared.log
            exit 1
          fi
          
          echo "FINAL_URL=$FINAL_URL" >> $GITHUB_ENV
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "☁️ CLOUDFLARE TUNNEL URL: $FINAL_URL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Display Complete Access Details
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════════════╗"
          echo "║            🎉 HERMES AGENT - CLOUDFLARE TUNNEL ACTIVE 🎉              ║"
          echo "╠══════════════════════════════════════════════════════════════════════════╣"
          echo "║                                                                          ║"
          echo "║  🌐 PUBLIC URL: ${{ env.FINAL_URL }}                                  ║"
          echo "║                                                                          ║"
          echo "║  🔑 PASSWORD: HarmesDeploy2024!                                         ║"
          echo "║                                                                          ║"
          echo "║  🔌 LOCAL: http://localhost:8648                                        ║"
          echo "║                                                                          ║"
          echo "║  ⏰ DURATION: Up to 6 hours                                             ║"
          echo "║  💡 Keep this workflow RUNNING for continued access                    ║"
          echo "║                                                                          ║"
          echo "╚══════════════════════════════════════════════════════════════════════════╝"

      - name: Monitor and Keep Running
        run: |
          echo "⏳ Starting monitoring loop..."
          echo "Will keep running for up to 6 hours..."
          echo ""
          
          ELAPSED=0
          while [ $ELAPSED -lt 360 ]; do
            # Check container
            if docker ps | grep -q hermes-webui; then
              :
            else
              echo "[$ELAPSED min] 🔄 Restarting Hermes..."
              docker start hermes-webui 2>/dev/null || \
              docker run -d \
                --name hermes-webui \
                -p 8648:8648 \
                -p 6060:6060 \
                -v ~/hermes-data:/root/.hermes \
                -v ~/workspace:/workspace \
                -e HERMES_WEBUI_PASSWORD=HarmesDeploy2024! \
                ekkoye8888/hermes-web-ui:latest
              sleep 5
            fi
            
            # Check tunnel
            if ! pgrep -f cloudflared > /dev/null; then
              echo "[$ELAPSED min] 🔄 Restarting Tunnel..."
              nohup cloudflared tunnel --url http://localhost:8648 > cloudflared.log 2>&1 &
              sleep 5
            fi
            
            # Every 5 minutes
            if [ $((ELAPSED % 5)) -eq 0 ] && [ $ELAPSED -gt 0 ]; then
              TUNNEL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' cloudflared.log 2>/dev/null | head -1)
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "⏰ Time: $ELAPSED minutes | Remaining: $((360 - ELAPSED)) minutes"
              echo "🌐 URL: ${TUNNEL:-Checking...}"
              echo "🔑 Password: HarmesDeploy2024!"
              echo "✅ Hermes: $(docker ps | grep hermes-webui && echo 'RUNNING' || echo 'RESTARTED')"
              echo "☁️  Tunnel: $(pgrep -f cloudflared && echo 'ACTIVE' || echo 'RESTARTED')"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            fi
            
            sleep 60
            ELAPSED=$((ELAPSED + 1))
          done
          
          echo ""
          echo "⏰⏰⏰ 6 HOURS COMPLETED ⏰⏰⏰"
