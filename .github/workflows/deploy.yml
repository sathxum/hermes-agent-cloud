name: Deploy Hermes Agent - Official NousResearch

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Docker
        run: |
          sudo apt-get remove -y containerd 2>/dev/null || true
          curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
          sudo sh /tmp/get-docker.sh
          sudo systemctl enable docker

      - name: Install Cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared

      - name: Create .env
        run: |
          mkdir -p ~/.hermes
          SECRET=$(openssl rand -base64 32)
          API_KEY=$(openssl rand -hex 32)
          
          cat > ~/.hermes/.env << EOF
HERMES_DASHBOARD_BASIC_AUTH_USERNAME=admin
HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=HarmesDeploy2024!
HERMES_DASHBOARD_BASIC_AUTH_SECRET=$SECRET
API_SERVER_ENABLED=true
API_SERVER_HOST=0.0.0.0
API_SERVER_KEY=$API_KEY
HERMES_DASHBOARD=1
EOF
          chmod 600 ~/.hermes/.env

      - name: Pull and Start
        run: |
          docker pull nousresearch/hermes-agent:latest
          docker stop hermes 2>/dev/null || true
          docker rm hermes 2>/dev/null || true
          
          docker run -d \
            --name hermes \
            --restart unless-stopped \
            -p 8642:8642 \
            -p 9119:9119 \
            -v ~/.hermes:/opt/data \
            --env-file ~/.hermes/.env \
            nousresearch/hermes-agent:latest gateway run
          
          sleep 30
          docker ps

      - name: Cloudflare Tunnel
        run: |
          pkill -f cloudflared 2>/dev/null || true
          nohup cloudflared tunnel --url http://localhost:9119 > cloudflared.log 2>&1 &
          
          for i in {1..20}; do
            URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' cloudflared.log | head -1)
            [ -n "$URL" ] && echo "URL=$URL" >> $GITHUB_ENV && break
            sleep 2
          done
          echo "☁️ URL: $(cat cloudflared.log | grep trycloudflare | head -1)"

      - name: Display
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 HERMES AGENT OFFICIAL DEPLOYED!"
          echo "🌐 URL: ${{ env.URL }}"
          echo "🔑 Username: admin"
          echo "🔑 Password: HarmesDeploy2024!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Monitor
        run: |
          for i in {1..360}; do
            docker ps | grep -q hermes || docker start hermes
            pgrep -f cloudflared > /dev/null || nohup cloudflared tunnel --url http://localhost:9119 > cloudflared.log 2>&1 &
            [ $((i % 5)) -eq 0 ] && echo "⏰ $i min | $(grep trycloudflare cloudflared.log 2>/dev/null | head -1)"
            sleep 60
          done
