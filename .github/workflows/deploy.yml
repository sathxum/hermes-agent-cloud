name: Deploy Hermes Agent

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io docker-compose curl
          sudo systemctl enable docker
          docker --version

      - name: Create directories
        run: mkdir -p ~/hermes-data ~/workspace

      - name: Generate Credentials
        run: |
          echo "🔐 CREDENTIALS:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Web UI Password: HarmesDeploy2024!"
          echo "Agent API Key: $(openssl rand -hex 32)"
          echo "Session Secret: $(openssl rand -hex 48)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Pull Image
        run: |
          echo "📦 Pulling Hermes image..."
          docker pull ekkye8888/hermes-web-ui:latest || docker pull ekkoye8888/hermes-web-ui:latest || echo "Will try without pulling"

      - name: Start Container
        run: |
          echo "🐳 Starting container..."
          docker stop hermes-webui 2>/dev/null || true
          docker rm hermes-webui 2>/dev/null || true
          docker network create hermes-net 2>/dev/null || true
          
          docker run -d \
            --name hermes-webui \
            --network hermes-net \
            -p 8648:8648 \
            -p 6060:6060 \
            -v ~/hermes-data:/root/.hermes \
            -v ~/workspace:/workspace \
            ekkye8888/hermes-web-ui:latest || \
          docker run -d \
            --name hermes-webui \
            --network hermes-net \
            -p 8648:8648 \
            -p 6060:6060 \
            -v ~/hermes-data:/root/.hermes \
            -v ~/workspace:/workspace \
            ekkoye8888/hermes-web-ui:latest || \
          echo "⚠️ Container start failed"
          
          sleep 10
          docker ps --format "table {{.Names}}\t{{.Status}}"

      - name: Check Status
        run: |
          echo "🔍 Checking Hermes..."
          docker ps | grep hermes-webui || echo "❌ Not running"
          docker logs hermes-webui --tail 30 2>/dev/null || echo "No logs"

      - name: Final Output
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════╗"
          echo "║         🎉 HERMES AGENT DEPLOYMENT 🎉            ║"
          echo "╠════════════════════════════════════════════════════╣"
          echo "║  🌐 Access: http://localhost:8648                ║"
          echo "║  🔑 Password: HarmesDeploy2024!                  ║"
          echo "║  📦 Image: ekkye8888/hermes-web-ui:latest       ║"
          echo "╚════════════════════════════════════════════════════╝"
